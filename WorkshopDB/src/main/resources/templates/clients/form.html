<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: common-head}">
    <title th:text="${formTitle}">Forma</title>
</head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: main-nav}"></div>

<div class="container mt-4" style="max-width: 600px;">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0" th:text="${formTitle}">Form</h4>
        </div>
        <div class="card-body">

            <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
                <ul class="mb-0">
                    <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                </ul>
            </div>

            <!-- th:action koristi @{} expression, th:object veže form-backing objekt -->
            <form th:action="@{${formAction}}"
                  th:object="${clientForm}"
                  method="post">

                <div class="mb-3">
                    <label for="name" class="form-label">Ime <span class="text-danger">*</span></label>
                    <!-- th:field generira id, name i value automatski -->
                    <!-- th:errorclass dodaje CSS klasu ako postoji greška na polju -->
                    <input id="name" type="text"
                           class="form-control"
                           th:field="*{name}"
                           th:errorclass="is-invalid">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="telnumber" class="form-label">Telephone</label>
                    <input id="telnumber" type="text"
                           class="form-control"
                           th:field="*{telnumber}"
                           th:errorclass="is-invalid">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('telnumber')}"
                         th:errors="*{telnumber}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" type="email"
                           class="form-control"
                           th:field="*{email}"
                           th:errorclass="is-invalid">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}">
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a th:href="@{/clients}" class="btn btn-outline-secondary">Abort</a>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
