<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/layout :: common-head}">
    <title>Client Details</title>
</head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: main-nav}"></div>
<div th:replace="~{fragments/layout :: flash-message}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3" th:text="${client.name}">Client Name</h1>
        <div>
            <a th:href="@{/clients/{id}/edit(id=${client.id})}" class="btn btn-outline-primary me-1">Edit</a>
            <a th:href="@{/clients}" class="btn btn-outline-secondary">← Back</a>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Contact Info</h5>
        </div>
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-2">Name</dt>
                <dd class="col-sm-10" th:text="${client.name}">Name</dd>

                <dt class="col-sm-2">Phone</dt>
                <dd class="col-sm-10" th:text="${client.telnumber ?: '-'}">091...</dd>

                <dt class="col-sm-2">Email</dt>
                <dd class="col-sm-10" th:text="${client.email ?: '-'}">mail@...</dd>
            </dl>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Cars</h5>
            <a th:href="@{/cars/new}" class="btn btn-sm btn-primary">+ Add Car</a>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(autos)}" class="alert alert-info mb-0">
                No cars for this client.
            </div>
            <table th:unless="${#lists.isEmpty(autos)}" class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Make</th>
                        <th>Model</th>
                        <th>Engine type</th>
                        <th>Engine</th>
                        <th>kW</th>
                        <th>VIN</th>
                        <th>Year</th>
                        <th>Repair History</th>
                        <th>Mileage</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="auto : ${autos}">
                        <td th:text="${auto.make}">Make</td>
                        <td th:text="${auto.model}">Model</td>
                        <td th:text="${auto.enginetype}">Engine type</td>
                        <td th:text="${auto.engine}">Engine</td>
                        <td th:text="${auto.powerKW}">kW</td>
                        <td th:text="${auto.vin}">VIN</td>
                         <td th:text="${auto.year}">2024</td>
                        <td><a th:href="@{/repairs(autoId=${auto.id})}" class="text-primary">Repairs</a></td>
                        <td th:text="${auto.mileage ?: '-'}">10000</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/layout :: main-footer}"></div>
</body>
</html>
