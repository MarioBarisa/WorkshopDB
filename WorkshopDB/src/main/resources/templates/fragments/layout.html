<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!--  Bootstrap -->
<head th:fragment="common-head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>

<!-- Navigacija -->
<nav th:fragment="main-nav" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container p-2">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/}">
            <svg viewBox="0 0 24 24" fill="none" width="28" height="28" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path opacity="0.1" d="M20 7C20 9.20914 16.4183 11 12 11C7.58172 11 4 9.20914 4 7C4 4.79086 7.58172 3 12 3C16.4183 3 20 4.79086 20 7Z" fill="#ffffff"></path> <path opacity="0.1" d="M19.75 13.4766C19.3141 14.0925 18.6191 14.6267 17.7687 15.052C16.2794 15.7966 14.2395 16.25 12 16.25C9.76047 16.25 7.72059 15.7966 6.23134 15.052C5.38086 14.6267 4.68587 14.0925 4.25 13.4766V17C4.25 17.9588 5.03381 18.8942 6.45495 19.6048C7.86113 20.3079 9.82126 20.75 12 20.75C14.1787 20.75 16.1389 20.3079 17.5451 19.6048C18.9662 18.8942 19.75 17.9588 19.75 17V13.4766Z" fill="#ffffff"></path> <path d="M20 7C20 9.20914 16.4183 11 12 11C7.58172 11 4 9.20914 4 7C4 4.79086 7.58172 3 12 3C16.4183 3 20 4.79086 20 7Z" stroke="#ffffff" stroke-width="2"></path> <path d="M20 12C20 14.2091 16.4183 16 12 16C7.58172 16 4 14.2091 4 12" stroke="#ffffff" stroke-width="2"></path> <path d="M4 7V17C4 19.2091 7.58172 21 12 21C16.4183 21 20 19.2091 20 17V7" stroke="#ffffff" stroke-width="2"></path> </g></svg>
            WorkshopDB
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/clients}">Clients</a>
                <a class="nav-link" th:href="@{/cars}">Cars</a>
                <a class="nav-link" th:href="@{/mechanics}">Mechanics</a>
                <a class="nav-link" th:href="@{/repairs}">Repairs</a>
                <a class="nav-link text-primary" th:href="@{/ai}">WorkshopDB Ai</a>
            </div>
        </div>
    </div>
</nav>

<!-- Flash poruka -->
<div th:fragment="flash-message">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show m-3" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- Footer -->
<footer th:fragment="main-footer" class="bg-dark text-light text-center p-2  mb-0">
    <div class="container">
        <p class="mb-1 small">
            Made by <a href="https://www.barisa.me" class="text-light text-decoration-none fw-bold" target="_blank">Mario Bariša</a>
            | © 2026
        </p>
        <p class="mb-0 small">
            <a href="https://github.com/MarioBarisa/WorkshopDB" class="text-light-50 text-decoration-none" target="_blank">github.com/MarioBarisa/WorkshopDB</a>
        </p>
    </div>
</footer>

</body>
</html>
