<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Navigacija -->
<nav th:fragment="main-nav" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">🔧 WorkshopDB</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/clients}">Clients</a>
            <a class="nav-link" th:href="@{/autos}">Cars</a>
            <a class="nav-link" th:href="@{/mechanics}">Mechanics</a>
            <a class="nav-link text-warning" th:href="@{/ai}">AI Assistent</a>
        </div>
    </div>
</nav>

<!-- Flash poruka -->
<div th:fragment="flash-message">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show m-3" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!--  Bootstrap -->
<head th:fragment="common-head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

</body>
</html>
