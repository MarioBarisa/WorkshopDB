<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/layout :: common-head}">
    <title th:text="${formTitle}">Car Form</title>
</head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: main-nav}"></div>

<div class="container mt-4" style="max-width: 600px;">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0" th:text="${formTitle}">Car Form</h4>
        </div>
        <div class="card-body">

            <form th:action="@{${formAction}}"
                  th:object="${autoForm}"
                  method="post">

                <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
                    <ul class="mb-0">
                        <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                    </ul>
                </div>

                <div class="mb-3">
                    <label for="clientId" class="form-label">Owner <span class="text-danger">*</span></label>
                    <select id="clientId" class="form-control"
                            th:field="*{clientId}"
                            th:errorclass="is-invalid">
                        <option value="">-- Select client --</option>
                        <option th:each="c : ${clients}"
                                th:value="${c.id}"
                                th:text="${c.name}"></option>
                    </select>
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('clientId')}"
                         th:errors="*{clientId}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="make" class="form-label">Make</label>
                    <input id="make" type="text" class="form-control"
                           th:field="*{make}"
                           th:errorclass="is-invalid">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('make')}"
                         th:errors="*{make}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="model" class="form-label">Model</label>
                    <input id="model" type="text" class="form-control"
                           th:field="*{model}"
                           th:errorclass="is-invalid">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('model')}"
                         th:errors="*{model}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="vin" class="form-label">VIN</label>
                    <input id="vin" type="text" class="form-control"
                           th:field="*{vin}"
                           th:errorclass="is-invalid">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('vin')}"
                         th:errors="*{vin}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="enginetype" class="form-label">Engine Type</label>
                    <input id="enginetype" type="text" class="form-control"
                           th:field="*{enginetype}"
                           th:errorclass="is-invalid">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('enginetype')}"
                         th:errors="*{enginetype}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="engine" class="form-label">Engine</label>
                    <input id="engine" type="text" class="form-control"
                           th:field="*{engine}"
                           th:errorclass="is-invalid">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('engine')}"
                         th:errors="*{engine}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="powerKW" class="form-label">powerKW</label>
                    <input id="powerKW" type="number" class="form-control"
                           th:field="*{powerKW}"
                           th:errorclass="is-invalid">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('powerKW')}"
                         th:errors="*{powerKW}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="year" class="form-label">Year</label>
                    <input id="year" type="number" class="form-control"
                           th:field="*{year}"
                           th:errorclass="is-invalid">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('year')}"
                         th:errors="*{year}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="mileage" class="form-label">Mileage</label>
                    <input id="mileage" type="number" class="form-control"
                           th:field="*{mileage}"
                           th:errorclass="is-invalid">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('mileage')}"
                         th:errors="*{mileage}">
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a th:href="@{/cars}" class="btn btn-outline-secondary">Abort</a>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/layout :: main-footer}"></div>
</body>
</html>
