<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/layout :: common-head}">
    <title>Cars</title>
</head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: main-nav}"></div>
<div th:replace="~{fragments/layout :: flash-message}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3">Cars</h1>
        <a th:href="@{/cars/new}" class="btn btn-primary">+ New Car</a>
    </div>

    <form method="get" th:action="@{/cars}" class="mb-3">
        <div class="input-group" style="max-width: 400px;">
            <input type="text" name="search" class="form-control"
                   placeholder="Search by make or model..."
                   th:value="${search}">
            <button type="submit" class="btn btn-outline-secondary">Search</button>
            <a th:href="@{/cars}" class="btn btn-outline-danger"
               th:if="${search != null and !#strings.isEmpty(search)}">✕</a>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(autos)}" class="alert alert-info">
        No cars found.
    </div>

    <div th:unless="${#lists.isEmpty(autos)}" class="card shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Make</th>
                    <th>Model</th>
                    <th>VIN</th>
                    <th>Year</th>
                    <th>Engine</th>
                    <th>Repairs</th>
                    <th>Owner</th>
                    <th>Repairs</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="auto, stat : ${autos}">
                    <td th:text="${stat.count}" class="text-muted">1</td>
                    <td th:text="${auto.make}">Make</td>
                    <td th:text="${auto.model}">Model</td>
                    <td th:text="${auto.vin}">VIN</td>
                    <td th:text="${auto.year}">2024</td>
                    <td th:text="${auto.engine}">Engine</td>
                    <td><a th:href="@{/repairs(autoId=${auto.id})}" class="btn btn-sm btn-outline-info">Repair history</a></td>
                    <td th:text="${auto.mileage ?: '-'}">10000</td>
                    <td>
                        <a th:href="@{/clients/{id}(id=${auto.getClient().getId()})}"
                           th:text="${auto.client.name}">
                        </a>
                    </td>
                    <td>
                        <a th:href="@{/cars/{id}/edit(id=${auto.id})}"
                           class="btn btn-sm btn-outline-primary me-1">Edit</a>
                        <form th:action="@{/cars/{id}/delete(id=${auto.id})}"
                              method="post" style="display:inline;"
                              onsubmit="return confirm('Delete car?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
