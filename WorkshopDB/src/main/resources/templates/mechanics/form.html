<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/layout :: common-head}">
    <title th:text="${formTitle}">Mechanic Form</title>
</head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: main-nav}"></div>

<div class="container mt-4" style="max-width: 600px;">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0" th:text="${formTitle}">Mechanic Form</h4>
        </div>
        <div class="card-body">

            <form th:action="@{${formAction}}"
                  th:object="${mechanicForm}"
                  method="post">

                <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
                    <ul class="mb-0">
                        <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                    </ul>
                </div>

                <div class="mb-3">
                    <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
                    <input id="name" type="text" class="form-control"
                           th:field="*{name}"
                           th:errorclass="is-invalid">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label">Phone</label>
                    <input id="phone" type="text" class="form-control"
                           th:field="*{phone}"
                           th:errorclass="is-invalid">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('phone')}"
                         th:errors="*{phone}">
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a th:href="@{/mechanics}" class="btn btn-outline-secondary">Abort</a>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/layout :: main-footer}"></div>
</body>
</html>
