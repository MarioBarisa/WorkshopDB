<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/layout :: common-head}">
    <title>Repair History</title>
</head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: main-nav}"></div>
<div th:replace="~{fragments/layout :: flash-message}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3">Repair History</h1>
        <a th:href="@{/repairs/new}" class="btn btn-primary">+ New Repair</a>
    </div>

    <div th:if="${#lists.isEmpty(repairs)}" class="alert alert-info">
        No repairs found.
    </div>

    <div th:if="${filterLabel != null}" class="alert alert-info">
    Showing repairs for: <strong th:text="${filterLabel}">filter</strong>
    <a th:href="@{/repairs}" class="float-end">Clear filter</a>
</div>

    <div th:unless="${#lists.isEmpty(repairs)}" class="card shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Auto</th>
                    <th>Mechanic</th>
                    <th>Client</th>
                    <th>Date</th>
                    <th>Title</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r, stat : ${repairs}">
                    <td th:text="${stat.count}" class="text-muted">1</td>
                    <td th:text="${r.auto.make + ' ' + r.auto.model}">Make Model</td>
                    <td th:text="${r.mechanic.name}">Name</td>
                    <td>
                        <a th:href="@{/clients/{id}(id=${r.getAuto().getClient().getId()})}" th:text="${r.getAuto().getClient().getName()}">Client</a>
                    </td>
                    <td th:text="${r.date}">2024-01-01</td>
                    <td th:text="${r.title}">Title</td>
                    <td th:text="${r.price != null ? #numbers.formatDecimal(r.price, 1, 2) : '-'}">0.00</td>
                    <td>
                        <a th:href="@{/repairs/{id}/edit(id=${r.id})}"
                           class="btn btn-sm btn-outline-primary me-1">Edit</a>
                        <form th:action="@{/repairs/{id}/delete(id=${r.id})}"
                              method="post" style="display:inline;"
                              onsubmit="return confirm('Delete repair?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
